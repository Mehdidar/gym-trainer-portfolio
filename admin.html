<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiva K. | Leads Dashboard</title>

    <!-- Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        .admin-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* Sidebar Sidebar */
        .sidebar {
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 3rem;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
            font-weight: 500;
        }

        .nav-item i {
            font-size: 1.5rem;
        }

        .nav-item:hover, .nav-item.active {
            background-color: rgba(255, 74, 28, 0.1);
            color: var(--accent-color);
        }

        /* Main Content */
        .main-content {
            padding: 3rem 4rem;
            overflow-y: auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .dashboard-header h1 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .dashboard-header p {
            color: var(--text-secondary);
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .summary-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }

        .summary-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background-color: var(--accent-color);
        }

        .summary-value {
            font-size: 3rem;
            font-weight: 700;
            font-family: var(--font-heading);
        }

        .summary-label {
            color: var(--text-secondary);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Leads Table */
        .leads-table-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
        }

        .table-header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
        }

        .table-header h2 {
            font-size: 1.5rem;
        }

        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-new {
            background: rgba(255, 74, 28, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(255, 74, 28, 0.3);
        }

        .status-contacted {
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1.5rem 2rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.01);
        }

        td {
            color: var(--text-primary);
        }

        .lead-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #ffffff;
        }

        .lead-email {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .action-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(255, 74, 28, 0.1);
        }

        .btn-refresh {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-refresh:hover {
            background: #e63e14;
        }

        /* Note on functionality */
        .info-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.05);
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        @media (max-width: 1024px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }
            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 1.5rem 2rem;
            }
            .sidebar-brand { margin-bottom: 0; }
            .sidebar-nav { flex-direction: row; align-items: center; }
            .nav-item { padding: 0.8rem; }
            .nav-item span { display: none; }
            .nav-item:last-child { margin-top: 0 !important; }
            
            .main-content { padding: 2rem; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .dashboard-header { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
            .summary-grid { grid-template-columns: 1fr; }
            .table-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            
            .leads-table-container { overflow-x: auto; }
            table { min-width: 800px; }
            
            .sidebar-nav .nav-item span { display: none; }
        }

    </style>
</head>
<body>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                SHIVA K.<span style="color: var(--accent-color)">//</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <i class="ph ph-users"></i>
                    <span>Client Leads</span>
                </a>
                <a href="index.html" class="nav-item" style="margin-top: auto;">
                    <i class="ph ph-arrow-left"></i>
                    <span>Back to Website</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="dashboard-header">
                <div>
                    <h1>Leads Dashboard</h1>
                    <p>Manage and track your incoming client inquiries.</p>
                </div>
                <div class="info-pill" id="dbStatus">
                    <i class="ph ph-database"></i> Connected to Vercel KV Database
                </div>
            </div>

            <!-- Stats -->
            <div class="summary-grid">
                <div class="summary-card">
                    <span class="summary-value">0</span>
                    <span class="summary-label">Total Leads</span>
                </div>
                <div class="summary-card">
                    <span class="summary-value" style="color: var(--accent-color);">0</span>
                    <span class="summary-label">New Leads</span>
                </div>
                <div class="summary-card">
                    <span class="summary-value" style="color: #2ecc71;">0</span>
                    <span class="summary-label">Contacted</span>
                </div>
            </div>

            <!-- Leads Table -->
            <div class="leads-table-container">
                <div class="table-header">
                    <h2>Live Inquiries</h2>
                    <button class="btn-refresh" id="refreshBtn"><i class="ph ph-arrows-clockwise"></i> Refresh Vercel Leads</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Client Details</th>
                            <th>Goal</th>
                            <th>Date Received</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leadsBody">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 4rem; color: var(--text-secondary);">
                                <i class="ph ph-circle-notch ph-spin" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></i>
                                Fetching your leads from Vercel...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script>
        async function fetchLeads() {
            const body = document.getElementById('leadsBody');
            const refreshBtn = document.getElementById('refreshBtn');
            const stats = document.querySelectorAll('.summary-value');
            
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = '<i class="ph ph-circle-notch ph-spin"></i> Syncing...';

            try {
                const response = await fetch('/api/leads');
                const leads = await response.json();
                
                if (leads.length === 0) {
                    body.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 4rem; color: var(--text-secondary);">No leads found yet. Your coaching journey starts here!</td></tr>';
                    return;
                }

                // Update Stats
                stats[0].innerText = leads.length; // Total
                const newLeadsCount = leads.filter(l => l.status === 'new').length;
                stats[1].innerText = newLeadsCount;
                stats[2].innerText = leads.length - newLeadsCount;

                // Render Table
                body.innerHTML = leads.map(lead => `
                    <tr id="lead-${lead.id}">
                        <td>
                            <div class="lead-name">${lead.name}</div>
                            <div class="lead-email">${lead.email} <br> ${lead.phone}</div>
                        </td>
                        <td><strong style="color: var(--accent-color)">${lead.goal}</strong><br>${lead.message}</td>
                        <td>${lead.date}</td>
                        <td><span class="status-badge ${lead.status === 'new' ? 'status-new' : 'status-contacted'}">${lead.status === 'new' ? 'New Lead' : 'Contacted'}</span></td>
                        <td>
                            <div style="display: flex; gap: 0.5rem;">
                                <a href="mailto:${lead.email}" class="action-btn" title="Send Email"><i class="ph ph-envelope-simple"></i></a>
                                ${lead.status === 'new' ? `<button onclick="manageLead('${lead.id}', 'contacted')" class="action-btn" title="Mark Contacted"><i class="ph ph-check-circle"></i></button>` : ''}
                                <button onclick="manageLead('${lead.id}', 'delete')" class="action-btn" style="color: #ff4a1c; border-color: rgba(255, 74, 28, 0.2);" title="Delete"><i class="ph ph-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error("Fetch Error:", error);
                body.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 4rem; color: #ff4a1c;">Failed to load leads. Please check your Vercel KV connection.</td></tr>';
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = '<i class="ph ph-arrows-clockwise"></i> Refresh Vercel Leads';
            }
        }

        async function manageLead(id, action) {
            if (action === 'delete' && !confirm('Are you sure you want to delete this lead?')) return;
            
            try {
                const response = await fetch('/api/manage-lead', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, action })
                });
                
                if (response.ok) {
                    fetchLeads(); // Refresh data
                } else {
                    alert('Action failed. Please check your Vercel connection.');
                }
            } catch (err) {
                console.error("Manage Error:", err);
            }
        }

        // Initial Load
        document.addEventListener('DOMContentLoaded', fetchLeads);
        document.getElementById('refreshBtn').addEventListener('click', fetchLeads);
    </script>
</body>
</html>
